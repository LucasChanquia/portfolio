    <main class="container">
        <div class="row">
            <div class="col-12 py-5">
                <h1>Contacto</h1>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6">
                    <p>Te invito a que te contactes enviándome un mensaje o un whatsapp. </p>
                    <div class="codigo-qr">
                        <h2 class="mt-5">Escaneá o hacé click en el código y escribime.</h2>
                        <a href="https://api.whatsapp.com/send?phone=593515118325" target="_blank" title="Whatsapp">
                            <img class="mb-5 mt-4" src="images/whatsapp-qr.png" alt="QR">
                        </a>
                    </div>
                </div>

                <div class="col-12 col-sm-6">
                    <form action="" method="post">
                        <div>
                            <input type="text" name="txtNombre" id="txtNombre" placeholder="Nombre"
                                class="form-control shadow mb-3">
                        </div>
                        <div>
                            <input type="email" name="txtEmail" id="txtEmail" placeholder="Correo"
                                class="form-control shadow mb-3">
                        </div>
                        <div>
                            <input type="tel" name="txtTel" id="txtTel" placeholder="Teléfono/Whatsapp"
                                class="form-control shadow mb-3">
                        </div>
                        <div>
                            <textarea name="txtMensaje" id="txtMensaje" cols="30" rows="10"
                                placeholder="Escribe aquí tu mensaje" class="form-control shadow"></textarea>
                        </div>
                        <div>
                            <button type="submit" id="btnEnviar" class="btn mt-4">ENVIAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        </div>
